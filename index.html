            function performExportMsg() {
                if (selectedMessages.size === 0) {
                    alert('请先勾选要导出的消息');
                    return;
                }

                const includeTime = document.getElementById('exportTimeCheckbox')?.checked ?? true;
                const includeThinking = document.getElementById('exportThinkingCheckbox')?.checked ?? true;
                const includeSender = document.getElementById('exportSenderCheckbox')?.checked ?? true;

                const isSimpleMode = (!includeTime && !includeThinking && includeSender);

                let mdContent = `# 选中的消息记录\n\n`;
                mdContent += `导出时间：${new Date().toLocaleString()}\n`;
                mdContent += `共 ${selectedMessages.size} 条消息\n`;
                if (!isSimpleMode) mdContent += `---\n\n`;

                document.querySelectorAll('.msgRow').forEach(row => {
                    const key = row.dataset.msgKey;
                    if (!selectedMessages.has(key)) return;

                    const bubble = row.querySelector('.bubble');
                    if (!bubble) return;

                    const senderEl = bubble.querySelector('.senderTag');
                    const timeEl = bubble.querySelector('.bubbleTime');
                    const textEl = bubble.querySelector('.msgText');
                    const thinkingEl = bubble.querySelector('.thinkingContent');

                    const sender = senderEl ? senderEl.textContent : '未知';
                    const time = timeEl ? timeEl.textContent : '—';
                    const text = textEl ? textEl.textContent : '';
                    const thinking = thinkingEl ? thinkingEl.textContent : '';

                    let headerParts = [];
                    if (includeTime) headerParts.push(`[${time}]`);
                    if (includeSender) headerParts.push(`${sender}：`);
                    const header = headerParts.join(' ');

                    let body = text;
                    if (includeThinking && thinking) {
                        body += `\n\n> *思考过程:*\n> ${thinking.replace(/\n/g, '\n> ')}`;
                    }

                    if (isSimpleMode) {
                        let cleanedText = text.replace(/\s+/g, '').trim();
                        mdContent += `${sender}：${cleanedText}\n`;
                    } else {
                        mdContent += header ? `${header}\n${body}\n\n---\n\n` :
                        `${body}\n\n---\n\n`;
                    }
                });

                if (isSimpleMode && mdContent.endsWith('\n')) {
                    mdContent = mdContent.slice(0, -1);
                }

                const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `selected_messages_${Date.now()}.md`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
            }

            function exportMarkdown() {
                const format = document.querySelector('input[name="exportFormat"]:checked').value;
                const checkboxes = document.querySelectorAll('#convCheckList input[type=checkbox]:checked');
                const selectedIndices = Array.from(checkboxes).map(cb => parseInt(cb.value));
                if (!selectedIndices.length) {
                    alert('请至少选择一个对话');
                    return;
                }

                let mdContent = `# 聊天记录导出\n\n`;
                mdContent += `- 导出时间：${new Date().toLocaleString()}\n`;
                mdContent += `- 对话数量：${selectedIndices.length}\n`;
                mdContent += `- 格式：${format === 'full' ? '完整版' : '简洁版'}\n\n`;
                mdContent += `---\n\n`;

                for (const idx of selectedIndices) {
                    const meta = convMeta[idx];
                    const conv = conversations[meta.idx];
                    const msgs = getMessages(conv);

                    if (format === 'full') {
                        mdContent += `## ${meta.title}\n\n`;
                        mdContent += `- 消息数：${meta.msgCount}\n`;
                        mdContent += `- 最后更新：${meta.sortDate ? fmtDateTime(meta.sortDate) : '未知'}\n\n`;
                        for (const m of msgs) {
                            const ex = extractMessageText(m);
                            if (!ex.text && !ex.thinking) continue;
                            const sender = ex.who === 'human' ? settings.humanName : settings.aiName;
                            mdContent += `### ${sender}\n`;
                            mdContent += `- 时间：${ex.dateObj ? fmtDateTime(ex.dateObj) : '—'}\n`;
                            if (ex.thinking) {
                                mdContent +=
                                    `- 思考过程：\n  > ${ex.thinking.replace(/\n/g, '\n  > ')}\n`;
                            }
                            mdContent += `- 内容：\n  ${ex.text.replace(/\n/g, '\n  ')}\n\n`;
                            mdContent += `---\n\n`;
                        }
                    } else {
                        mdContent += `## ${meta.title}\n\n`;
                        for (const m of msgs) {
                            const ex = extractMessageText(m);
                            if (!ex.text && !ex.thinking) continue;
                            const sender = ex.who === 'human' ? settings.humanName : settings.aiName;
                            let content = ex.text;
                            if (ex.thinking) content = `[思考] ${ex.thinking}\n${content}`;
                            mdContent += `${sender}：${content.replace(/\n/g, ' ')}\n`;
                        }
                        mdContent += `\n---\n\n`;
                    }
                }

                const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `chat_export_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.md`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                els.exportModal.classList.remove('show');
            }
            // ----- 内容区渲染：对话、时间轴、统计、收藏 -----
            function selectConversation(displayIndex) {
                selectedIndex = displayIndex;
                if (multiSelectMode) toggleMultiSelectMode();
                selectedMessages.clear();
                refreshActiveHighlight();
                const meta = convMeta[displayIndex];
                if (!meta) return;
                els.currentConvTitle.textContent = meta.title;
                els.currentConvSub.textContent =
                    `${meta.sortDate ? fmtDateTime(meta.sortDate) : '—'} · ${numberWithCommas(meta.msgCount)} 条 · 共 ${numberWithCommas(meta.charCount)} 字 (${settings.humanName} ${numberWithCommas(meta.humanChars || 0)} 字 | ${settings.aiName} ${numberWithCommas(meta.aiChars || 0)} 字)`;
                const msgsRaw = getMessages(conversations[meta.idx]);
                els.content.innerHTML = '';
                const frag = document.createDocumentFragment();
                let msgIdx = 0;
                for (const m of msgsRaw) {
                    const ex = extractMessageText(m);
                    if (!ex.text && !ex.thinking) continue;
                    if (ex.who !== 'human' && ex.who !== 'assistant') ex.who = 'assistant';
                    frag.appendChild(createMessageBubble(ex, meta.idx, msgIdx));
                    msgIdx++;
                }
                if (!msgIdx) {
                    els.content.innerHTML =
                        `<div class="emptyState"><div style="color:var(--muted);font-weight:500;">没有可显示的消息</div></div>`;
                } else {

            // 统计视图
            function renderStatsView() {
                els.currentConvTitle.textContent = '月度统计';
                els.currentConvSub.textContent = '';
                updateSearchBadge(0, true);
                if (!conversations.length) {
                    els.content.innerHTML =
                        `<div class="emptyState"><div style="color:var(--muted);font-weight:500;">请先导入数据</div></div>`;
                    return;
                }
                const monthMap = new Map();
                let totalHumanMsgs = 0,
                    totalHumanChars = 0,
                    totalAiMsgs = 0,
                    totalAiChars = 0;
                conversations.forEach((conv, idx) => {
                    for (const m of getMessages(conv)) {
                        const ex = extractMessageText(m);
                        if (!ex.text && !ex.thinking || !ex.dateObj) continue;
                        const mk = getEffectiveDateKey(ex.dateObj).slice(0, 7);
                        if (!monthMap.has(mk)) monthMap.set(mk, { convs: new Set(), msgs: 0, chars: 0,
                            humanMsgs: 0, humanChars: 0, aiMsgs: 0, aiChars: 0 });
                        const e = monthMap.get(mk);
                        e.convs.add(idx);
                        e.msgs++;
                        e.chars += ex.text?.length || 0;
                        if (ex.who === 'human') {
                            e.humanMsgs++;
                            e.humanChars += ex.text?.length || 0;
                            totalHumanMsgs++;
                            totalHumanChars += ex.text?.length || 0;
                        } else {
                            e.aiMsgs++;
                            e.aiChars += ex.text?.length || 0;
                            totalAiMsgs++;
                            totalAiChars += ex.text?.length || 0;
                        }
                    }
                });
                const monthData = Array.from(monthMap.entries()).map(([mk, v]) => ({
                    month: mk,
                    convCount: v.convs.size,
                    msgCount: v.msgs,
                    charCount: v.chars,
                    humanMsgs: v.humanMsgs,
                    humanChars: v.humanChars,
                    aiMsgs: v.aiMsgs,
                    aiChars: v.aiChars
                })).sort((a, b) => a.month.localeCompare(b.month));
                if (!monthData.length) {
                    els.content.innerHTML =
                        `<div class="emptyState"><div style="color:var(--muted);font-weight:500;">暂无有时间戳的消息</div></div>`;
                    return;
                }
                const maxMsgs = Math.max(...monthData.map(d => d.msgCount), 1);
                const n = monthData.length;
                const barW = Math.max(14, Math.min(44, Math.floor(560 / n) - 8));
                const gap = Math.max(5, Math.floor(barW * 0.35));
                const padL = 10,
                    padR = 10,
                    padT = 24,
                    padB = 40;
                const innerH = 140;
                const totalW = n * (barW + gap) - gap + padL + padR;
                const totalH = innerH + padT + padB;
                const NS = 'http://www.w3.org/2000/svg';
                const svg = document.createElementNS(NS, 'svg');
                svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
                svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                svg.style.cssText = 'width:100%;height:auto;overflow:visible;display:block;';
                monthData.forEach((d, i) => {
                    const x = padL + i * (barW + gap);
                    const barH = Math.max(2, Math.round((d.msgCount / maxMsgs) * innerH));
                    const y = padT + (innerH - barH);
                    const rect = document.createElementNS(NS, 'rect');
                    rect.setAttribute('x', x);
                    rect.setAttribute('y', y);
                    rect.setAttribute('width', barW);
                    rect.setAttribute('height', barH);
                    rect.setAttribute('rx', '4');
                    rect.setAttribute('fill', 'var(--orange)');
                    rect.style.opacity = '0.8';
                    rect.style.cursor = 'default';
                    rect.addEventListener('mouseenter', () => rect.style.opacity = '1');
                    rect.addEventListener('mouseleave', () => rect.style.opacity = '0.8');
                    const title = document.createElementNS(NS, 'title');
                    title.textContent =
                        `${fmtMonthCN(d.month)}\n消息：${d.msgCount}\n对话：${d.convCount}\n字符：${d.charCount}`;
                    rect.appendChild(title);
                    if (barH > 20) {
                        const cnt = document.createElementNS(NS, 'text');
                        cnt.setAttribute('x', x + barW / 2);
                        cnt.setAttribute('y', y - 8);
                        cnt.setAttribute('text-anchor', 'middle');
                        cnt.setAttribute('font-size', '10');
                        cnt.setAttribute('fill', 'var(--muted)');
                        cnt.textContent = d.msgCount > 999 ? `${(d.msgCount / 1000).toFixed(1)}k` : d
                            .msgCount;
                        svg.appendChild(cnt);
                    }
                    const [yr, mo] = d.month.split('-');
                    const lbl = document.createElementNS(NS, 'text');
                    lbl.setAttribute('x', x + barW / 2);
                    lbl.setAttribute('y', padT + innerH + 20);
                    lbl.setAttribute('text-anchor', 'middle');
                    lbl.setAttribute('font-size', n > 18 ? '9' : '11');
                    lbl.setAttribute('fill', 'var(--muted)');
                    lbl.textContent = n > 24 ? mo : `${parseInt(mo)}月`;
                    svg.appendChild(rect);
                    svg.appendChild(lbl);
                });
                const wrap = document.createElement('div');
                wrap.className = 'statsView';
                const totalMsgs = convMeta.reduce((s, m) => s + m.msgCount, 0);
                const totalChars = convMeta.reduce((s, m) => s + m.charCount, 0);
                const hdr = document.createElement('div');
                hdr.className = 'statsViewHead';
                hdr.innerHTML =
                    `<h2>历史概览</h2><p>共 ${numberWithCommas(monthData.length)} 个月记录 · ${numberWithCommas(convMeta.length)} 个对话 · ${numberWithCommas(totalMsgs)} 条消息</p>`;
                const summaryCard = document.createElement('div');
                summaryCard.className = 'chartCard';
                summaryCard.style.cssText =
                    'display:grid;grid-template-columns:1fr 1fr;gap:24px; border:none; background: transparent; padding: 0; box-shadow: none;';
                summaryCard.innerHTML = `
      <div style="background: var(--panel); padding: 24px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow2);">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">${settings.humanName}</div>
      <div style="font-size:28px;font-weight:600;color:var(--text);line-height:1;">${numberWithCommas(totalHumanMsgs)}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px;">发送消息数</div></div>
      <div style="background: var(--panel); padding: 24px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow2);">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">${settings.aiName}</div>
      <div style="font-size:28px;font-weight:600;color:var(--text);line-height:1;">${numberWithCommas(totalAiMsgs)}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px;">回复消息数</div></div>
    `;
                wrap.appendChild(hdr);
                wrap.appendChild(summaryCard);
                const chartCard = document.createElement('div');
                chartCard.className = 'chartCard';
                chartCard.innerHTML = '<h3>活跃度趋势</h3>';
                chartCard.appendChild(svg);
                wrap.appendChild(chartCard);
                const tableCard = document.createElement('div');
                tableCard.className = 'tableCard';
                const table = document.createElement('table');
                table.className = 'statsTable';
                table.innerHTML =
                    `<thead><tr><th>月份</th><th>对话数</th><th>总消息</th><th>${settings.humanName}</th><th>${settings.aiName}</th><th>字符量</th></tr></thead>`;
                const tbody = document.createElement('tbody');
                [...monthData].reverse().forEach(d => {
                    const tr = document.createElement('tr');
                    tr.innerHTML =
                        `<td>${fmtMonthCN(d.month)}</td><td>${numberWithCommas(d.convCount)}</td><td>${numberWithCommas(d.msgCount)}</td><td>${numberWithCommas(d.humanMsgs)}</td><td>${numberWithCommas(d.aiMsgs)}</td><td>${numberWithCommas(d.charCount)}</td>`;
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                tableCard.appendChild(table);
                wrap.appendChild(tableCard);
                els.content.innerHTML = '';
                els.content.appendChild(wrap);
                els.content.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ----- 文件导入与示例 -----
            function openFilePicker() {

                input.type = 'file';
                input.accept = '.json,application/json';
                input.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
                input.onchange = async (e) => {
                    const f = e.target.files?.[0];
                    document.body.removeChild(input);
                    if (!f) return;
                    if (!f.name.toLowerCase().endsWith('.json')) { alert('请选择 .json 文件。'); return; }
                    await handleFile(f);
                };
                document.body.appendChild(input);
                input.click();
            }
            async function handleFile(file) {
                if (!file) return;
                let raw;
                try { raw = await file.text(); } catch (err) { alert('读取文件失败：' + (err?.message || err));
                    return; }
                let data;
                try { data = JSON.parse(raw); } catch (err) { alert('JSON解析失败。\n\n错误：' + (err?.message || err));
                    return; }
                if (!Array.isArray(data)) { alert('JSON结构不符合预期：根节点应为数组。'); return; }
                conversations = data;
                buildMeta();
                buildTimelineMeta();
                renderList();
                resetContentArea();
                updateGlobalStats();
                hideEmptyStateIfNeeded();
                if (isMobile()) closeMobileSidebar();
            }

            // ----- 导出 TXT （对话/日）-----
            function exportConversationTxt(meta, msgsRaw) {
                const lines = [`对话：${meta.title}`, `时间：${fmtDateTime(new Date())}`, `共 ${meta.msgCount} 条消息`, '—'.repeat(
                    40), ''];
                for (const m of msgsRaw) {
                    const ex = extractMessageText(m);
                    if (!ex.text && !ex.thinking) continue;
                    const who = ex.who === 'human' ? settings.humanName : settings.aiName;
                    lines.push(`[${ex.dateObj ? fmtDateTime(ex.dateObj) : '—'}] ${who}：`);
                    if (ex.thinking?.trim()) { lines.push('【思考过程】', ex.thinking.trim(), '【思考结束】'); }
                    lines.push(ex.text || '', '');
                }
                downloadTxt(meta.title.replace(/[\/\\:*?"<>|]/g, '_').slice(0, 60) + '.txt', lines.join('\n'));
            }
            function exportDayTxt(dateKey, convGroups) {
                const lines = [`日期：${fmtDateCN(dateKey)}`, `导出：${fmtDateTime(new Date())}`, '—'.repeat(40), ''];
                for (const group of convGroups) {
                    lines.push(`【${group.convTitle}】`, '');
                    for (const item of group.items) {
                        const ex = item.ex;
                        const who = ex.who === 'human' ? settings.humanName : settings.aiName;
                        lines.push(`[${ex.dateObj ? fmtTimeShort(ex.dateObj) : '—'}] ${who}：`);
                        if (ex.thinking?.trim()) { lines.push('【思考过程】', ex.thinking.trim(), '【思考结束】'); }
                        lines.push(ex.text || '', '');
                    }
                    lines.push('');
                }
                downloadTxt(`${dateKey}.txt`, lines.join('\n'));
            }
            function downloadTxt(filename, content) {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a);
                    URL.revokeObjectURL(url); }, 1000);
            }

                els.setDaySplit.value = settings.daySplitHour;
                els.setFontSize.value = settings.fontSize;
                els.fontSizeLabel.textContent = settings.fontSize + 'px';
                els.setFontSize.addEventListener('input', () => { els.fontSizeLabel.textContent = els.setFontSize.value +
                        'px'; });
                els.settingsPanel.classList.add('open');
                els.settingsBg.classList.add('show');
            }
            function closeSettings() {
                els.settingsPanel.classList.remove('open');
                els.settingsBg.classList.remove('show');
            }
            function saveSettings() {
                const newHuman = els.setHumanName.value.trim() || '我';
                const newAi = els.setAiName.value.trim() || 'TA';
                const newSplit = Math.max(0, Math.min(12, parseInt(els.setDaySplit.value) || 0));
                const newFont = Math.max(12, Math.min(20, parseInt(els.setFontSize.value) || 14));
                const splitChanged = newSplit !== settings.daySplitHour;
                settings.humanName = newHuman;
                settings.aiName = newAi;
                settings.daySplitHour = newSplit;
                settings.fontSize = newFont;
                applyFontSize();
                persistSettings();
                if (splitChanged && conversations.length) {
                    buildTimelineMeta();
                    if (viewMode === 'timeline') renderList();
                }

                if (viewMode === 'conv' || viewMode === 'timeline') {
                    const activeIdx = viewMode === 'conv' ? selectedIndex : selectedDayKey;
                    if (activeIdx !== -1 && activeIdx !== null) {
                        if (viewMode === 'conv') selectConversation(selectedIndex);
                        if (viewMode === 'timeline') selectDay(selectedDayKey);
                    }
                }

                closeSettings();
            }

            // ----- 滚动按钮 -----
            function updateScrollBtns() {
                const y = els.content.scrollTop;
                const remain = els.content.scrollHeight - els.content.scrollTop - els.content.clientHeight;
                els.toTopBtn.style.opacity = y > 300 ? '1' : '0';
                els.toTopBtn.style.pointerEvents = y > 300 ? 'auto' : 'none';
                els.toBottomBtn.style.opacity = remain > 300 ? '1' : '0';
                els.toBottomBtn.style.pointerEvents = remain > 300 ? 'auto' : 'none';
            }

            // ----- 拖拽导入 -----
            const showDropOverlay = show => els.dropOverlay.classList.toggle('show', !!show);
            window.addEventListener('dragenter', e => { e.preventDefault();
                showDropOverlay(true); });
            window.addEventListener('dragover', e => e.preventDefault());
            window.addEventListener('dragleave', e => { if (!e.relatedTarget) showDropOverlay(false); });
            window.addEventListener('drop', async e => {
                e.preventDefault();
                showDropOverlay(false);
                const file = e.dataTransfer?.files?.[0];
                if (!file) return;
                if (!file.name.toLowerCase().endsWith('.json')) { alert('拖入的不是 JSON 文件。'); return; }
                await handleFile(file);
            });

            // ----- 初始化与事件绑定 -----
            function init() {
                loadSettings();
                loadFavorites();
                try {
                    const theme = localStorage.getItem('cg_viewer_theme');
                    if (theme === 'dark' || theme === 'light') setTheme(theme);
                    else setTheme('light');
                    const sc = localStorage.getItem('sidebar_collapsed');
                    if (sc === '1') setSidebarCollapsed(true);
                } catch (e) {}
                handleResize();
                updateScrollBtns();

                bindExportModalButtons();
                els.toggleBtn.addEventListener('click', () => setSidebarCollapsed(!sidebarCollapsed));
                els.mobileSidebarBtn.addEventListener('click', openMobileSidebar);
                els.sidebarOverlay.addEventListener('click', closeMobileSidebar);
                els.chooseBtn.addEventListener('click', openFilePicker);
                els.reimportBtn.addEventListener('click', openFilePicker);
                els.demoBtn.addEventListener('click', loadDemo);
                els.exportMarkdownBtn.addEventListener('click', showExportModal);
                els.tabConv.addEventListener('click', () => switchView('conv'));
                els.tabTimeline.addEventListener('click', () => switchView('timeline'));
                els.tabStats.addEventListener('click', () => switchView('stats'));
                els.tabFav.addEventListener('click', () => switchView('favorites'));
                els.searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { applySearch();
                        nextMatch(); } });
                els.searchInput.addEventListener('input', () => { clearTimeout(els.searchInput._t);
                    els.searchInput._t = setTimeout(applySearch, 300); });
                els.clearSearchBtn.addEventListener('click', () => { els.searchInput.value = '';
                    applySearch();
                    els.searchInput.focus(); });
                els.searchPrevBtn.addEventListener('click', prevMatch);
                els.searchNextBtn.addEventListener('click', nextMatch);
                els.themeBtn.addEventListener('click', () => setTheme(document.body.getAttribute('data-theme') ===
                    'dark' ? 'light' : 'dark'));
                els.settingsBtn.addEventListener('click', openSettings);
                els.spClose.addEventListener('click', closeSettings);
                els.settingsBg.addEventListener('click', closeSettings);
                els.spSaveBtn.addEventListener('click', saveSettings);
                els.toTopBtn.addEventListener('click', () => els.content.scrollTo({ top: 0, behavior: 'smooth' }));
                els.toBottomBtn.addEventListener('click', () => els.content.scrollTo({ top: els.content.scrollHeight,
                    behavior: 'smooth' }));
                els.content.addEventListener('scroll', updateScrollBtns);
                els.dropZone.addEventListener('click', openFilePicker);

                if (els.cancelExportBtn) els.cancelExportBtn.addEventListener('click', () => els.exportModal.classList
                    .remove('show'));
                if (els.confirmExportBtn) els.confirmExportBtn.addEventListener('click', exportMarkdown);

                const quickSimpleBtn = document.getElementById('quickSimpleBtn');
                const quickFullBtn = document.getElementById('quickFullBtn');
                const cancelMsgExportBtn = document.getElementById('cancelMsgExportBtn');
                const confirmMsgExportBtn = document.getElementById('confirmMsgExportBtn');

                if (quickSimpleBtn) quickSimpleBtn.addEventListener('click', () => setExportPreset('simple'));
                if (quickFullBtn) quickFullBtn.addEventListener('click', () => setExportPreset('full'));
                if (cancelMsgExportBtn) cancelMsgExportBtn.addEventListener('click', closeExportMsgDialog);
                if (confirmMsgExportBtn) confirmMsgExportBtn.addEventListener('click', () => {
                    closeExportMsgDialog();
                    performExportMsg();
                });

                const multiBtn = document.getElementById('multiSelectBtn');
                const selectAllBtn = document.getElementById('selectAllMsgBtn');
                if (multiBtn) multiBtn.addEventListener('click', toggleMultiSelectMode);
                if (selectAllBtn) selectAllBtn.addEventListener('click', selectAllVisibleMessages);

                const exportSelectedBtn = document.getElementById('exportSelectedBtn');
                if (exportSelectedBtn) exportSelectedBtn.addEventListener('click', exportSelectedMessages);

                window.addEventListener('resize', handleResize);
            }
            init();
        })();
    </script>
</body>
</html>
